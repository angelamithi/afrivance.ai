<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Afrivance AI</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0ea5e9;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">

    <a href="index.html" class="back-link">← Back to Home</a>

    <h1>Contact Us</h1>

    <p>
        We'd love to hear from you. Send us a message and we'll get back to you shortly.
    </p>

   <form action="https://formspree.io/f/mlgklozo"
      method="POST"
      onsubmit="setTimeout(() => window.location.href='thank-you.html', 1000)">

    <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" required>
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea name="message" required></textarea>
    </div>

    <button type="submit">
        Send Message
    </button>

</form>

</div>

</body>
</html>
