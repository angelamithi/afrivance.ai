<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Afrivance AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:  #0A1628;
      --teal:  #00C8C8;
      --teal2: #00a8a8;
      --amber: #E8935A;
      --white: #F0F4F8;
      --muted: #8899AA;
      --card:  #152035;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .page-wrap {
      width: 100%;
      max-width: 620px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--muted); text-decoration: none;
      font-size: .85rem; margin-bottom: 2rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--teal); }

    .card {
      background: #111f3a;
      border: 1px solid rgba(0,200,200,.15);
      border-radius: 18px;
      padding: 2.5rem 2rem;
    }

    .card-header { text-align: center; margin-bottom: 2rem; }
    .card-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(0,200,200,.1); color: var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin: 0 auto 1rem;
      border: 1px solid rgba(0,200,200,.2);
    }
    .card-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.65rem; font-weight: 700;
      color: var(--white); margin-bottom: .5rem;
      letter-spacing: -.02em;
    }
    .card-header p { color: var(--muted); font-size: .9rem; line-height: 1.6; }

    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block; margin-bottom: .45rem;
      font-size: .82rem; font-weight: 600;
      color: var(--muted); letter-spacing: .04em; text-transform: uppercase;
    }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .92rem;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus {
      border-color: rgba(0,200,200,.5);
      background: rgba(255,255,255,.07);
    }
    textarea { min-height: 140px; resize: vertical; }

    .submit-btn {
      width: 100%; padding: .9rem;
      background: var(--teal); color: var(--navy);
      border: none; border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: .5rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: background .2s, transform .15s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--teal2); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: .7; cursor: not-allowed; }

    /* Status message */
    .status-msg {
      display: none;
      margin-top: 1.25rem;
      padding: 1rem 1.2rem;
      border-radius: 10px;
      font-size: .88rem;
      line-height: 1.6;
      text-align: center;
    }
    .status-msg.success {
      display: block;
      background: rgba(0,200,200,.08);
      border: 1px solid rgba(0,200,200,.25);
      color: var(--teal);
    }
    .status-msg.error {
      display: block;
      background: rgba(232,147,90,.08);
      border: 1px solid rgba(232,147,90,.25);
      color: var(--amber);
    }

    .divider {
      border: none; border-top: 1px solid rgba(255,255,255,.07);
      margin: 1.75rem 0;
    }

    .alt-contact {
      display: flex; flex-direction: column; gap: .75rem;
    }
    .alt-item {
      display: flex; align-items: center; gap: .75rem;
      font-size: .85rem; color: var(--muted);
    }
    .alt-item i { color: var(--teal); width: 16px; text-align: center; }
    .alt-item a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .alt-item a:hover { color: var(--teal); }

    @media (max-width: 480px) {
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="card">
    <div class="card-header">
      <div class="card-icon"><i class="fas fa-envelope"></i></div>
      <h1>Let's Talk</h1>
      <p>Have a challenge, an idea, or just want to explore what AI can do for you? Send us a message and we'll get back to you within 1 business day.</p>
    </div>

    <form id="contact-form">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="cf-name" placeholder="e.g. Angela Mithi" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="cf-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="cf-phone" placeholder="+254 7xx xxx xxx" />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="cf-subject" placeholder="What's this about?" required />
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="cf-message" placeholder="Tell us what you're working on or what you need help with…" required></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        <i class="fas fa-paper-plane"></i> Send Message
      </button>

      <div class="status-msg" id="status-msg"></div>
    </form>

    <hr class="divider">

    <div class="alt-contact">
      <div class="alt-item">
        <i class="fas fa-envelope"></i>
        <span>Email us directly: <a href="mailto:info@afrivance.ai">info@afrivance.ai</a></span>
      </div>
      <div class="alt-item">
        <i class="fab fa-facebook"></i>
        <span>Follow us: <a href="https://www.facebook.com/profile.php?id=61559787553578" target="_blank">Afrivance AI on Facebook</a></span>
      </div>
      <div class="alt-item">
        <i class="fas fa-map-marker-alt"></i>
        <span>Nairobi, Kenya — serving clients across Africa</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Point this at your Render backend ──────────────────────
  const API_URL = 'https://afrivance-ai.onrender.com/api/contact';
  // ───────────────────────────────────────────────────────────

  document.getElementById('contact-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name    = document.getElementById('cf-name').value.trim();
    const email   = document.getElementById('cf-email').value.trim();
    const phone   = document.getElementById('cf-phone').value.trim();
    const subject = document.getElementById('cf-subject').value.trim();
    const message = document.getElementById('cf-message').value.trim();

    if (!name || !email || !subject || !message) return;

    const btn    = document.getElementById('submit-btn');
    const status = document.getElementById('status-msg');

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';
    status.className = 'status-msg';
    status.style.display = 'none';

    try {
      const res = await fetch(API_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, subject, message })
      });

      if (res.ok) {
        // redirect to branded thank-you page
        window.location.href = 'thank-you.html';
      } else {
        throw new Error('Server error');
      }
    } catch (err) {
      status.className = 'status-msg error';
      status.innerHTML = `
        Something went wrong sending your message. Please email us directly at
        <a href="mailto:info@afrivance.ai" style="color:var(--amber)">info@afrivance.ai</a>
        and we'll get back to you right away.
      `;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
  });
</script>
</body>
</html>
