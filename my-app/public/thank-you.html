<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Afrivance AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e293b 50%,
                #334155 100%
            );
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 700px;
            width: 100%;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 20px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 15px;
        }

        p {
            color: #64748b;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(
                135deg,
                #00d4ff,
                #0ea5e9
            );
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">

        <div class="icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <h1>Thank You!</h1>

        <p>
            Your message has been successfully submitted.
            <br><br>
            A member of the Afrivance AI team will review your inquiry and get back to you as soon as possible.
        </p>

        <a href="index.html" class="btn">
            Return to Homepage
        </a>

    </div>

</body>
</html>
